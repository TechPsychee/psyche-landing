<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Platform Features Illustration -->
    <rect width="200" height="200" fill="#ffffff"/>
    
    <!-- Central Hub -->
    <circle cx="100" cy="100" r="20" 
            fill="none" 
            stroke="#8C1515" 
            stroke-width="2"/>
    
    <!-- Feature Nodes -->
    <g transform="translate(0 0)">
        <!-- Chat Node -->
        <circle cx="60" cy="60" r="15" 
                fill="#ffffff" 
                stroke="#8C1515" 
                stroke-width="2"/>
        <path d="M55 60 L65 60 M60 55 L60 65" 
              stroke="#8C1515" 
              stroke-width="1.5"/>
        
        <!-- Analytics Node -->
        <circle cx="140" cy="60" r="15" 
                fill="#ffffff" 
                stroke="#8C1515" 
                stroke-width="2"/>
        <path d="M133 60 L147 60" 
              stroke="#8C1515" 
              stroke-width="1.5"/>
        <path d="M140 67 L140 53" 
              stroke="#8C1515" 
              stroke-width="1.5"/>
        
        <!-- Resources Node -->
        <circle cx="140" cy="140" r="15" 
                fill="#ffffff" 
                stroke="#8C1515" 
                stroke-width="2"/>
        <path d="M133 140 C137 135, 143 135, 147 140" 
              stroke="#8C1515" 
              stroke-width="1.5"
              fill="none"/>
        
        <!-- Support Node -->
        <circle cx="60" cy="140" r="15" 
                fill="#ffffff" 
                stroke="#8C1515" 
                stroke-width="2"/>
        <path d="M55 140 C57 135, 63 135, 65 140" 
              stroke="#8C1515" 
              stroke-width="1.5"
              fill="none"/>
    </g>
    
    <!-- Connection Lines -->
    <g stroke="#8C1515" stroke-width="1.5" fill="none">
        <path d="M75 75 L85 85" stroke-dasharray="4 4"/>
        <path d="M115 85 L125 75" stroke-dasharray="4 4"/>
        <path d="M115 115 L125 125" stroke-dasharray="4 4"/>
        <path d="M75 125 L85 115" stroke-dasharray="4 4"/>
    </g>
    
    <!-- Central Icon -->
    <path d="M90 100 L110 100 M100 90 L100 110" 
          stroke="#8C1515" 
          stroke-width="2"/>
    
    <!-- Orbital Path -->
    <circle cx="100" cy="100" r="60" 
            fill="none" 
            stroke="#8C1515" 
            stroke-width="1"
            stroke-dasharray="2 4"
            stroke-opacity="0.4"/>
</svg>
