        // Three.js setup
        let scene, camera, renderer, controls;
        let nodes = [];
        let lines = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00d9ff, 1, 50);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            // Create network
            createNetwork();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('click', onNodeClick);

            // Modal close
            document.getElementById('close-modal').addEventListener('click', closeModal);
            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target.id === 'modal') closeModal();
            });

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);

            animate();
        }

        function createNetwork() {
            const allNodes = [];

            // Create center node
            const centerNode = createNode(networkData.center, 0, 0, 0);
            allNodes.push({ mesh: centerNode, data: networkData.center, isCenter: true });

            // Create major nodes in a circle around center
            const majorRadius = 8;
            const majorCount = networkData.nodes.length;

            networkData.nodes.forEach((nodeData, index) => {
                const angle = (index / majorCount) * Math.PI * 2;
                const x = Math.cos(angle) * majorRadius;
                const y = Math.sin(angle) * majorRadius;
                const z = (Math.random() - 0.5) * 4;

                const majorNode = createNode(nodeData, x, y, z);
                allNodes.push({ mesh: majorNode, data: nodeData, isMajor: true });

                // Connect to center
                createConnection(centerNode.position, majorNode.position);

                // Create child nodes if they exist
                if (nodeData.children) {
                    const childRadius = 3;
                    const childCount = nodeData.children.length;

                    nodeData.children.forEach((childData, childIndex) => {
                        const childAngle = (childIndex / childCount) * Math.PI * 2;
                        const cx = x + Math.cos(childAngle) * childRadius;
                        const cy = y + Math.sin(childAngle) * childRadius;
                        const cz = z + (Math.random() - 0.5) * 2;

                        const childNode = createNode(childData, cx, cy, cz, 0.6);
                        allNodes.push({ mesh: childNode, data: childData, isChild: true, parent: nodeData });

                        // Connect child to parent
                        createConnection(majorNode.position, childNode.position);
                    });
                }
            });

            nodes = allNodes;
        }

        function createNode(data, x, y, z, sizeMultiplier = 1) {
            const size = (data.size || 0.8) * sizeMultiplier;
            const geometry = new THREE.SphereGeometry(size, 32, 32);

            let color = 0x00d9ff;
            if (data.type === 'center') color = 0xff3366;
            else if (data.color) color = data.color;

            const material = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3,
                shininess: 100,
                transparent: true,
                opacity: 0.8
            });

            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            sphere.userData = data;

            scene.add(sphere);

            // Add text label
            if (data.label) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 128;

                context.fillStyle = 'rgba(0, 0, 0, 0)';
                context.fillRect(0, 0, canvas.width, canvas.height);

                context.font = 'bold 48px IBM Plex Mono';
                context.fillStyle = '#e8e8e8';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText(data.label, canvas.width / 2, canvas.height / 2);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.scale.set(2, 1, 1);
                sprite.position.set(x, y - size - 1, z);

                scene.add(sprite);
            }

            return sphere;
        }

        function createConnection(pos1, pos2) {
            const points = [pos1, pos2];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color: 0x00d9ff,
                opacity: 0.2,
                transparent: true
            });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            lines.push(line);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseMove(event) {
            if (isDragging) {
                const deltaMove = {
                    x: event.clientX - previousMousePosition.x,
                    y: event.clientY - previousMousePosition.y
                };

                scene.rotation.y += deltaMove.x * 0.005;
                scene.rotation.x += deltaMove.y * 0.005;

                previousMousePosition = {
                    x: event.clientX,
                    y: event.clientY
                };
            }

            // Update mouse position for raycaster
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Highlight hovered nodes
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh));

            nodes.forEach(node => {
                node.mesh.material.emissiveIntensity = 0.3;
            });

            if (intersects.length > 0) {
                intersects[0].object.material.emissiveIntensity = 0.7;
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onNodeClick(event) {
            if (isDragging) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh));

            if (intersects.length > 0) {
                const nodeData = intersects[0].object.userData;
                showModal(nodeData);
            }
        }

        function showModal(data) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modal-body');

            let content = data.content;
            if (!content && data.children) {
                // If major node without content, show all children
                content = {
                    title: data.label,
                    body: data.children.map(child => `
                        <h3>${child.content.title}</h3>
                        ${child.content.body}
                    `).join('')
                };
            }

            if (content) {
                modalBody.innerHTML = `
                    <h2>${content.title}</h2>
                    ${content.body}
                `;
                modal.classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Subtle auto-rotation when not dragging
            if (!isDragging) {
                scene.rotation.y += 0.001;
            }

            // Pulse effect on nodes
            const time = Date.now() * 0.001;
            nodes.forEach((node, index) => {
                const pulse = Math.sin(time + index) * 0.1 + 0.9;
                node.mesh.material.opacity = 0.7 + pulse * 0.1;
            });

            renderer.render(scene, camera);
        }

        // Initialize
        init();
    </script>
</body>
</html>
