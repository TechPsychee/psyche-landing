<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <!-- Background -->
    <rect width="800" height="400" fill="#ffffff"/>
    
    <!-- Platform Window -->
    <rect x="40" y="20" width="720" height="360" 
          fill="#f8f8f8" 
          stroke="#8C1515" 
          stroke-width="2"
          rx="10"/>
    
    <!-- Navigation Bar -->
    <rect x="40" y="20" width="160" height="360" 
          fill="#ffffff" 
          stroke="#8C1515" 
          stroke-width="2"
          rx="10"/>
          
    <!-- Nav Items -->
    <g transform="translate(60 50)">
        <!-- Home -->
        <rect width="120" height="40" 
              fill="#8C1515" 
              rx="5" 
              opacity="0.1"/>
        <text x="40" y="25" 
              font-family="Arial" 
              font-size="14" 
              fill="#8C1515">Home</text>
              
        <!-- Chat -->
        <rect y="50" width="120" height="40" 
              fill="#ffffff" 
              rx="5"/>
        <text x="40" y="75" 
              font-family="Arial" 
              font-size="14" 
              fill="#8C1515">Chat</text>
              
        <!-- Journal -->
        <rect y="100" width="120" height="40" 
              fill="#ffffff" 
              rx="5"/>
        <text x="40" y="125" 
              font-family="Arial" 
              font-size="14" 
              fill="#8C1515">Journal</text>
              
        <!-- Progress -->
        <rect y="150" width="120" height="40" 
              fill="#ffffff" 
              rx="5"/>
        <text x="40" y="175" 
              font-family="Arial" 
              font-size="14" 
              fill="#8C1515">Progress</text>
    </g>
    
    <!-- Main Content Area -->
    <g transform="translate(220 40)">
        <!-- Welcome Card -->
        <rect x="0" y="0" width="520" height="100" 
              fill="#ffffff" 
              stroke="#8C1515" 
              stroke-width="1"
              rx="8"/>
              
        <!-- Stats Cards -->
        <g transform="translate(0 120)">
            <!-- Sessions Card -->
            <rect width="160" height="100" 
                  fill="#ffffff" 
                  stroke="#8C1515" 
                  stroke-width="1"
                  rx="8"/>
            <!-- Progress Card -->
            <rect x="180" width="160" height="100" 
                  fill="#ffffff" 
                  stroke="#8C1515" 
                  stroke-width="1"
                  rx="8"/>
            <!-- Goals Card -->
            <rect x="360" width="160" height="100" 
                  fill="#ffffff" 
                  stroke="#8C1515" 
                  stroke-width="1"
                  rx="8"/>
        </g>
        
        <!-- Activity Timeline -->
        <rect x="0" y="240" width="520" height="80" 
              fill="#ffffff" 
              stroke="#8C1515" 
              stroke-width="1"
              rx="8"/>
    </g>
    
    <!-- Graph Elements -->
    <g transform="translate(240 160)">
        <!-- Progress Line -->
        <path d="M20 60 
                 C40 40, 60 50, 80 30
                 C100 10, 120 20, 140 40" 
              fill="none"
              stroke="#8C1515"
              stroke-width="2"
              stroke-opacity="0.6"/>
    </g>
    
    <!-- Chat Preview -->
    <g transform="translate(420 160)">
        <!-- Chat Bubbles -->
        <path d="M20 40
                 C20 30, 30 20, 40 20
                 L100 20
                 C110 20, 120 30, 120 40
                 L120 60
                 L110 70
                 L40 70
                 C30 70, 20 60, 20 50
                 Z"
              fill="#f8f8f8"
              stroke="#8C1515"
              stroke-width="1"/>
              
        <path d="M60 90
                 C60 80, 70 70, 80 70
                 L140 70
                 C150 70, 160 80, 160 90
                 L160 110
                 L150 120
                 L80 120
                 C70 120, 60 110, 60 100
                 Z"
              fill="#f8f8f8"
              stroke="#8C1515"
              stroke-width="1"/>
    </g>
    
    <!-- Profile Section -->
    <g transform="translate(660 40)">
        <circle cx="40" cy="30" r="20" 
                fill="#ffffff"
                stroke="#8C1515"
                stroke-width="1"/>
        <path d="M25 30 L55 30" 
              stroke="#8C1515"
              stroke-width="1"/>
        <path d="M40 15 L40 45" 
              stroke="#8C1515"
              stroke-width="1"/>
    </g>
</svg>
