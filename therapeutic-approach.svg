<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Therapeutic Approach Illustration -->
    <rect width="200" height="200" fill="#ffffff"/>
    
    <!-- Main Circle Frame -->
    <circle cx="100" cy="100" r="70" 
            fill="none" 
            stroke="#8C1515" 
            stroke-width="2"
            stroke-dasharray="4 4"/>
    
    <!-- Inner Elements -->
    <g transform="translate(0 -5)">
        <!-- Mind/Brain Representation -->
        <path d="M70 90
                 C70 70, 90 60, 100 60
                 C110 60, 130 70, 130 90
                 C130 110, 110 120, 100 120
                 C90 120, 70 110, 70 90
                 Z"
              fill="none"
              stroke="#8C1515"
              stroke-width="2"/>
        
        <!-- Connection Lines -->
        <path d="M85 90 C90 80, 110 80, 115 90"
              fill="none"
              stroke="#8C1515"
              stroke-width="1.5"/>
              
        <path d="M85 100 C90 90, 110 90, 115 100"
              fill="none"
              stroke="#8C1515"
              stroke-width="1.5"/>
    </g>
    
    <!-- Reflection Elements -->
    <g transform="translate(0 5)">
        <!-- Mirror/Reflection Lines -->
        <path d="M60 130
                 C80 110, 120 110, 140 130"
              fill="none"
              stroke="#8C1515"
              stroke-width="2"/>
              
        <path d="M70 140
                 C90 120, 110 120, 130 140"
              fill="none"
              stroke="#8C1515"
              stroke-width="1.5"
              stroke-opacity="0.6"/>
    </g>
    
    <!-- Connection Points -->
    <circle cx="70" cy="90" r="3" fill="#8C1515"/>
    <circle cx="130" cy="90" r="3" fill="#8C1515"/>
    <circle cx="100" cy="120" r="3" fill="#8C1515"/>
    
    <!-- Growth Indicators -->
    <path d="M45 100 L55 90 L65 100" 
          stroke="#8C1515" 
          stroke-width="1.5"
          fill="none"
          stroke-linecap="round"/>
          
    <path d="M135 100 L145 90 L155 100" 
          stroke="#8C1515" 
          stroke-width="1.5"
          fill="none"
          stroke-linecap="round"/>
</svg>
