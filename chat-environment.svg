<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Chat Environment Illustration -->
    <rect width="200" height="200" fill="#ffffff"/>
    
    <!-- Background Shape -->
    <path d="M20 40 
             C60 40, 140 40, 180 40
             C190 40, 190 50, 190 60
             L190 140
             C190 150, 180 160, 170 160
             L30 160
             C20 160, 10 150, 10 140
             L10 60
             C10 50, 10 40, 20 40
             Z" 
          fill="#f8f8f8" 
          stroke="#8C1515" 
          stroke-width="2"/>
    
    <!-- Chat Bubbles -->
    <g transform="translate(-10 -10)">
        <!-- Left Bubble -->
        <path d="M40 80
                 C40 70, 50 60, 60 60
                 L100 60
                 C110 60, 120 70, 120 80
                 L120 100
                 C120 110, 110 120, 100 120
                 L50 120
                 L40 130
                 L40 80
                 Z"
              fill="#ffffff"
              stroke="#8C1515"
              stroke-width="2"/>
        
        <!-- Right Bubble -->
        <path d="M100 140
                 C100 130, 110 120, 120 120
                 L160 120
                 C170 120, 180 130, 180 140
                 L180 160
                 C180 170, 170 180, 160 180
                 L110 180
                 L100 190
                 L100 140
                 Z"
              fill="#ffffff"
              stroke="#8C1515"
              stroke-width="2"/>
    </g>
</svg>
